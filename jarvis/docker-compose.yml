services:
  db:
    image: postgres:16-alpine
    container_name: jarvis-db
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis # local dev only; production uses env override
      POSTGRES_DB: jarvis
    ports:
      - "5434:5432" # 5433/6380 belong to DIGIKALA (SPEC §3)
    volumes:
      - jarvis_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  jarvis_pg:
