name: Update README activity

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: readme-activity
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Rewrite activity block
        run: |
          python3 - <<'EOF'
          import re, subprocess, datetime
          log = subprocess.run(
              ["git", "log", "-5", "--grep=\\[skip ci\\]", "--invert-grep",
               "--pretty=format:- `%h` %s — %ad", "--date=format:%Y-%m-%d"],
              capture_output=True, text=True).stdout
          now = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          block = f"<!-- ACTIVITY:START -->\n_Auto-updated {now}_\n\n{log}\n<!-- ACTIVITY:END -->"
          readme = open("README.md").read()
          new = re.sub(r"<!-- ACTIVITY:START -->.*?<!-- ACTIVITY:END -->",
                       lambda m: block, readme, flags=re.S)
          open("README.md", "w").write(new)
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || { git commit -m "docs: refresh README activity [skip ci]"; git push; }
