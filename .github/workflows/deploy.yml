name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # npm install (not ci): npm 10/11 have a known lockfile self-sync bug with this
      # dependency tree (commander hoisting) — install self-heals and stays fast with cache
      - run: npm install --no-audit --no-fund
      - run: npm run generate
        env:
          # served under /Noxioai/ on github.io — remove this when noxioai.com custom domain is attached
          NUXT_APP_BASE_URL: /Noxioai/
          NUXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
